name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade npm to 10.x
        run: npm install -g npm@10

      - name: Install dependencies
        run: npm install

      - name: Build all packages
        run: npx turbo run build

      - name: Verify a2a-antigravity managed Python setup
        run: node a2a-antigravity/dist/cli.js setup --venv-dir "$RUNNER_TEMP/a2a-antigravity-venv"

      - name: Verify a2a-antigravity npm package contents
        run: npm pack -w a2a-antigravity --dry-run

      - name: Publish to npm
        run: npx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
